<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sign Up</title>
  <link rel="stylesheet" href="./styles/loginsignup.css" />
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>
<body>
  <div class="container">

    <!-- LEFT -->
    <div class="left">
      <div class="logo-box">
     <img src="../Frontend/Images/BENEFIT BUDDY.png" alt="Benefit Buddy Logo" class="logo" />
       
        <p class="tagline">
          A simple way to discover unclaimed income<br>
          and tax related benefits in the UK
        </p>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="right">
      <form class="form-box">
        <h1>Create Account!</h1>

        <input type="text" placeholder="Username" required />

        <div class="password-field">
          <input type="password" placeholder="Password" required />
        
        </div>

        <button class="main-btn">Register</button>

        <p class="switch-text">
          Already have an account?
          <a href="login.html">Login</a>
        </p>
      </form>
    </div>

  </div>
</body>
</html>
