<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Browse Benefits</title>

    <link rel="stylesheet" href="/styles/benefits.css" />
    <link rel="stylesheet" href="/styles/main.css" />
    <link rel="stylesheet" href="/styles/info.css" />
    <link rel="stylesheet" href="/styles/responsive.css" />
  </head>

  <body>
    <!-- NAVBAR -->
    <nav class="navbar">
      <div class="nav-left">
        <img src="/Images/BENEFIT BUDDY.png" class="logo-img" />
      </div>

      <div class="nav-links">
        <a href="/main.html" class="nav-btn">Home</a>
        <a href="/buddy.html" class="nav-btn">Chat with Buddy</a>
        <a href="/info.html" class="nav-btn">Help Center</a>
        <a href="/benefits.html" class="nav-btn">Browse Benefits</a>
        <a href="/About.html" class="nav-btn">About Us</a>
      </div>

      <div class="profile">
        <input type="checkbox" id="profileToggle" />

        <label for="profileToggle" class="profile-btn">
          <img src="/Images/user.jpg" class="profile-img" />
        </label>

        <div class="profile-dropdown">
          <a href="/login.html">Login</a>
          <a href="/signup.html">Add new account</a>
          <a href="#">Settings</a>
          <a href="/main.html">Logout</a>
        </div>
      </div>
    </nav>

    <!-- HERO -->
    <header class="hero">
      <h1>Find the Benefits You May Be Entitled To</h1>
      <p>Search, compare and learn how to apply.</p>

      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search benefits..." />
        <button class="search-btn" onclick="searchBenefits()">🔍</button>
      </div>
    </header>

    <!-- NO RESULT -->
    <div id="noResult" class="no-result" style="display: none">
      No results found
    </div>

    <!-- BENEFITS GRID -->
    <section class="benefit-grid" id="benefitGrid"></section>

    <!-- MODAL -->
    <div class="modal" id="modal">
      <div class="modal-box">
        <span class="close-btn" onclick="closeModal()">✖</span>
        <div id="modalContent"></div>
      </div>
    </div>
    <section class="page-feedback">
      <h3>Is this page useful?</h3>

      <div class="feedback-buttons">
        <button onclick="submitFeedback('Yes')">Yes</button>
        <button onclick="submitFeedback('No')">No</button>
      </div>

      <p id="feedbackMessage"></p>
    </section>
    <script src="/scripts/benefits.js" defer></script>
  </body>
</html>
