<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Benefit Buddy</title>
      <link rel="icon" type="image/png" href="./Images/BENEFIT BUDDY.png">

    <link rel="stylesheet" href="/styles/main.css" />
    <link rel="stylesheet" href="/styles/buddy.css" />
    <link rel="stylesheet" href="/styles/responsive.css" />
    
  </head>

  <body>
    <!-- NAVBAR -->
    <nav class="navbar">
      <div class="nav-left">
     <img src="/Images/bb.png" alt="Logo" class="logo-img" />
      </div>

      <div class="nav-links">
        <a href="/main.html" class="nav-btn">Home</a>
        <a href="/buddy.html" class="nav-btn">Chat with Buddy</a>
        <a href="/info.html" class="nav-btn">Help Center</a>
        <a href="/benefits.html" class="nav-btn">Browse Benefits</a>
        <a href="/About.html" class="nav-btn">About Us</a>
      </div>

      <div class="profile">
        <input type="checkbox" id="profileToggle" />

        <label for="profileToggle" class="profile-btn">
          <img src="/Images/user.jpg" alt="User" class="profile-img" />
        </label>

        <div class="profile-dropdown">
          <a href="/login.html">Login</a>
          <a href="/signup.html">Add new account</a>
          <a href="#">Settings</a>
          <a href="/main.html">Logout</a>
        </div>
      </div>
    </nav>

    <!-- CHAT APP -->
    <div class="buddy-app">
      <!-- LEFT PANEL -->
      <aside class="left-panel">
        <button class="new-chat" onclick="newChat()">+ New Chat</button>
        <button class="history-btn" onclick="toggleHistory()">
          View History
        </button>
        <button class="history-btn" onclick="downloadChat()">
          Download Chat
        </button>

        <div id="historyBox" class="history-box"></div>
      </aside>

      <!-- MAIN CHAT -->
      <main class="chatgpt-main">
        <!-- CHAT MESSAGES -->
        <div id="chatBox" class="chat-stream">
          <div class="welcome-title">
            <h1>Hello 👋 I am Benefit Buddy</h1>
            <h2>How can I assist you today?</h2>
          </div>
        </div>

        <!-- INPUT -->
        <div class="composer-wrap">
          <textarea
            id="messageInput"
            placeholder="Message Benefit Buddy..."
            rows="1"
          ></textarea>

         <button class="send-btn" onclick="sendMessage()">
         <i class="fa-solid fa-paper-plane"></i>
          </button>
        </div>
    </main>
 
    <script src="/scripts/buddy.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="chat.js"></script>
 

  </body>
</html>
