<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="/styles/loginsignup.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="/styles/responsive.css" />
  </head>

  <body>
    <div class="container">
      <!-- LEFT -->
      <div class="left">
        <div class="logo-box">
          <img
            src="/Images/BENEFIT BUDDY.png"
            alt="Benefit Buddy Logo"
            class="logo"
          />

          <p class="tagline">
            A simple way to discover unclaimed income<br />
            and tax related benefits in the UK
          </p>
        </div>
      </div>

      <!-- RIGHT -->
      <div class="right">
        <form class="form-box" id="loginForm">
          <h1>Welcome Back!</h1>

          <input
            type="text"
            id="loginField"
            placeholder="Username or Email"
            required
          />
          <input
            type="password"
            id="Password"
            placeholder="Password"
            required
          />

          <button class="main-btn">Login</button>

          <p class="switch-text">
            Don't have an account?
            <a href="/signup.html">Sign Up</a>
          </p>
        </form>
      </div>
    </div>

    <script src="/scripts/login.js"></script>
  </body>
</html>
